<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>OcladeAI</title>
  <link rel="stylesheet" href="styles/main.css">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
</head>
<body>
  <!-- Menú lateral -->
  <div id="sidebar" class="sidebar hidden">
    <div class="logo">OcladeAI</div>
    <button id="new-chat-btn" class="btn">➕ Nueva conversación</button>
    <div class="history-section">
      <h3>Historial</h3>
      <ul id="chat-history"></ul>
    </div>
  </div>

  <!-- Contenido principal -->
  <div id="particles-js" class="background"></div>
  <header>
    <button id="menu-toggle" class="menu-btn">☰</button>
    <div class="logo-header">OcladeAI</div>
  </header>

  <main>
    <div class="greeting">
      <h1 id="time-greeting">Buenas noches</h1>
      <p>¿En qué te puedo ayudar hoy?</p>
    </div>

    <div id="thinking-container" class="thinking-container hidden">
      <div class="brain-animation"></div>
      <p>🧠 Pensando...</p>
    </div>

    <div id="chat-container" class="chat-container"></div>
  </main>

  <!-- Contador de tokens -->
  <div class="token-counter">0 / 4000 tokens</div>

  <!-- Barra inferior -->
  <footer>
    <button id="model-menu-btn" class="action-btn">🤖</button>
    <input type="file" id="file-upload" accept="image/*,.pdf,.txt" style="display:none;">
    <button id="attach-file" class="action-btn">📎</button>
    <input type="text" id="user-input" placeholder="Escribe tu mensaje..." autocomplete="off" inputmode="text">
    <button id="send-btn" class="send-btn">Enviar</button>
  </footer>

  <!-- Menú desplegable de modelos -->
  <div id="model-menu" class="model-menu hidden"
       style="position: fixed; bottom: 70px; left: 20px; z-index: 1000;
              background: rgba(10, 10, 20, 0.95); border-radius: 12px; padding: 0.5rem;
              display: flex; flex-direction: column; gap: 0.5rem; min-width: 150px;">
    <button data-model="code" class="model-btn">💻 Code 1.0</button>
    <button data-model="think" class="model-btn">🧠 Think 2.0</button>
    <button data-model="chat" class="model-btn">💬 Chat Pro</button>
  </div>

  <script src="js/ui/particles.js"></script>
  <script src="js/core/memory.js"></script>
  <script src="js/core/tokenizer.js"></script>
  <script src="js/ui/chat.js"></script>
  <script src="js/ui/animations.js"></script>
  <script src="js/models/code.js"></script>
  <script src="js/models/think.js"></script>
  <script src="js/models/chat.js"></script>
  <script src="js/models/investigate.js"></script>
  <script src="js/main.js"></script>

  <script>
    // Evitar desplazamiento al abrir teclado en iOS
    document.addEventListener('focusin', (e) => {
      if (e.target.tagName === 'INPUT' || e.target.tagName === 'TEXTAREA') {
        setTimeout(() => {
          window.scrollTo(0, 0);
        }, 100);
      }
    });

    // Menú de modelos
    const modelMenuBtn = document.getElementById('model-menu-btn');
    const modelMenu = document.getElementById('model-menu');
    if (modelMenuBtn && modelMenu) {
      modelMenuBtn.addEventListener('click', () => {
        modelMenu.classList.toggle('hidden');
      });

      document.querySelectorAll('#model-menu .model-btn').forEach(btn => {
        btn.addEventListener('click', () => {
          modelMenu.classList.add('hidden');
          // Actualiza el botón activo
          document.querySelectorAll('.model-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
        });
      });
    }
  </script>
</body>
</html>
